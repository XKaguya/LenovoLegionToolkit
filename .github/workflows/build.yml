name: Build

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:

    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Restore
      run: dotnet restore
    - name: Restore identity package signing key
      env:
        LAMPARRAY_PFX: ${{ secrets.LAMPARRAY_PFX }}
      run: |
        if (-not $env:LAMPARRAY_PFX) {
          Write-Error "Missing LAMPARRAY_PFX secret. The identity MSIX package cannot be signed."
          exit 1
        }

        [IO.File]::WriteAllBytes("LenovoLegionToolkit.LampArray.pfx", [Convert]::FromBase64String($env:LAMPARRAY_PFX))
      shell: powershell
    - name: Build
      env:
        LLT_CERT_PASSWORD: ${{ secrets.LAMPARRAY_PFX_PASSWORD }}
      run: .\make_action.bat
    - name: Verify installer
      run: |
        $installerPath = "build_installer\LenovoLegionToolkitSetup.exe"
        if (-not (Test-Path $installerPath)) {
          Write-Error "Installer file not found at $installerPath"
          exit 1
        }
      shell: powershell
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: installer
        path: build_installer\LenovoLegionToolkitSetup.exe
